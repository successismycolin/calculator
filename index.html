<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>Simple Calculator</header>

    <div id="container">
        <div id="calculator-container">
            <!-- textfield -->
            <div id="display">
                <textarea name="inputOutput" id="inputbox" rows="1" cols="20"></textarea>
            </div>

            <!-- buttons -->
            <div id="buttons">
                <button id="1" class="number" style="grid-area: box-1" onclick="addCharacter(1)">1</button>
                <button id="2" class="number" style="grid-area: box-2" onclick="addCharacter(2)">2</button>
                <button id="3" class="number" style="grid-area: box-3" onclick="addCharacter(3)">3</button>
                <button id="4" class="number" style="grid-area: box-4" onclick="addCharacter(4)">4</button>
                <button id="5" class="number" style="grid-area: box-5" onclick="addCharacter(5)">5</button>
                <button id="6" class="number" style="grid-area: box-6" onclick="addCharacter(6)">6</button>
                <button id="7" class="number" style="grid-area: box-7" onclick="addCharacter(7)">7</button>
                <button id="8" class="number" style="grid-area: box-8" onclick="addCharacter(8)">8</button>
                <button id="9" class="number" style="grid-area: box-9" onclick="addCharacter(9)">9</button>
                <button id="0" class="number" style="grid-area: box-10" onclick="addCharacter(0)">0</button>
                <button id="+" class="operator" style="grid-area: box-11" onclick="addCharacter('+')">+</button>
                <button id="-" class="operator" style="grid-area: box-12" onclick="addCharacter('-')">-</button>
                <button id="x" class="operator" style="grid-area: box-13" onclick="addCharacter('*')">x</button>
                <button id="/" class="operator" style="grid-area: box-14" onclick="addCharacter('/')">/</button>
                <button id="=" class="equals" style="grid-area: box-15" onclick="displayResult()">=</button>
                <button id="clear" class="action" style="grid-area: box-16" onclick="clearDisplay()">C</button>
                <button id="delete" class="action" style="grid-area: box-17" onclick="clearEntry()">CE</button>
                <button id="." class="number" style="grid-area: box-18" onclick="addDecimal()">.</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
